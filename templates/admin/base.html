<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Admin Panel · PropList{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <style>
        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 240px;
            flex-shrink: 0;
            background: #0d0d16;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .sidebar-brand {
            padding: 1.5rem 1.25rem;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid var(--border);
        }

        .sidebar-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-muted);
            padding: 1.25rem 1.25rem 0.4rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 0.5rem 0.75rem;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.6rem 0.75rem;
            border-radius: var(--radius-sm);
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition);
            margin-bottom: 0.15rem;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            background: rgba(99, 102, 241, 0.12);
            color: var(--primary-light);
        }

        .sidebar-footer {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .sidebar-footer a {
            color: var(--primary-light);
            font-size: 0.8rem;
        }

        .admin-main {
            flex: 1;
            overflow-y: auto;
            background: var(--bg);
        }

        .admin-topbar {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 15, 19, 0.9);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .admin-topbar h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }

        .admin-content {
            padding: 2rem;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.25rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: border-color var(--transition);
        }

        .stat-card:hover {
            border-color: var(--primary);
        }

        .stat-icon {
            font-size: 2rem;
            margin-bottom: 0.75rem;
        }

        .stat-value {
            font-size: 2.25rem;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .stat-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th {
            text-align: left;
            padding: 0.75rem 1rem;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        .admin-table td {
            padding: 0.85rem 1rem;
            font-size: 0.875rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            vertical-align: middle;
        }

        .admin-table tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .status-badge {
            display: inline-block;
            padding: 0.2rem 0.55rem;
            border-radius: 100px;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.15);
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .status-handled {
            background: rgba(34, 197, 94, 0.12);
            color: #86efac;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .admin-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        @media (max-width: 768px) {
            .admin-sidebar {
                display: none;
            }

            .stat-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-brand">🏠 PropList Admin</div>
            <div class="sidebar-label">Navigation</div>
            <nav class="sidebar-nav">
                <a href="/admin" class="sidebar-link {% if request.url.path == '/admin' %}active{% endif %}">📊
                    Dashboard</a>
                <a href="/admin/properties"
                    class="sidebar-link {% if '/admin/properties' in request.url.path %}active{% endif %}">🏠
                    Properties</a>
                <a href="/admin/requests"
                    class="sidebar-link {% if '/admin/requests' in request.url.path %}active{% endif %}">📬
                    Enquiries</a>
            </nav>
            <div class="sidebar-label">Site</div>
            <nav class="sidebar-nav" style="flex: 0;">
                <a href="/properties" class="sidebar-link">🌐 View Site</a>
                <a href="/auth/logout" class="sidebar-link">🚪 Logout</a>
            </nav>
            <div class="sidebar-footer">
                Logged in as<br><strong>{{ current_user.full_name }}</strong>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="admin-main">
            <div class="admin-topbar">
                <h1>{% block topbar_title %}Admin Panel{% endblock %}</h1>
                <span style="font-size:0.8rem; color: var(--text-muted);">{{ current_user.email }}</span>
            </div>
            <div class="admin-content">
                {% block content %}{% endblock %}
            </div>
        </div>
    </div>
    {% block scripts %}{% endblock %}
</body>

</html>
